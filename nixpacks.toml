[phases.setup]
aptPkgs = ["wget", "gnupg", "curl", "unzip", "python3", "python3-pip", "google-chrome-stable"]

[phases.setup.aptRepos]
googleChrome = "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main"

[phases.install]
cmds = ["pip3 install -r requirements.txt"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 600"
